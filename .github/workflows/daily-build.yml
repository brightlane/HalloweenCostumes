name: 🎃 Build Halloween Site

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # daily at 6am UTC — updates TODAY date in all pages
  workflow_dispatch:        # ← THIS is the manual "Run button" in GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run build.py
        run: python3 build.py

      - name: Commit & push generated files
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "🎃 Auto-build $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Nothing to commit"
          git push
